<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Escolar</title>

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    font-family: Arial;
    background: #f4f7f6;
}

/* HEADER */
.header {
    background: #A6192E;
    color: white;
    text-align: center;
    padding: 20px;
}

/* BOTÓN REGRESO */
.back-button {
    position: fixed;
    top: 20px;
    left: 20px;
    background: #A6192E;
    color: white;
    padding: 10px 15px;
    border-radius: 30px;
    text-decoration: none;
}

/* TITULO */
.title {
    text-align: center;
    font-size: 50px;
    color: #A6192E;
    margin: 20px;
}

/* GRID GALERIA */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 40px;
}

/* CUADROS MEDIANOS */
.item {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.item:hover {
    transform: scale(1.05);
}

.item img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.caption {
    padding: 10px;
    text-align: center;
}

</style>
</head>

<body>

<a href="index.html" class="back-button">⬅ Regresar</a>

<div class="header">
    <h1>GALERÍA ESCOLAR</h1>
</div>

<h2 class="title">Momentos</h2>

<div class="gallery-grid">

    <div class="item">
        <img src="1.png">
        <div class="caption">Evento 1</div>
    </div>

    <div class="item">
        <img src="1.png">
        <div class="caption">Evento 2</div>
    </div>

    <div class="item">
        <img src="1.png">
        <div class="caption">Evento 3</div>
    </div>

    <div class="item">
        <img src="1.png">
        <div class="caption">Evento 4</div>
    </div>

</div>

</body>
</html>
