<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Escolar</title>

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    font-family: Arial;
    background: #f4f7f6;
}

/* HEADER */
.header {
    background: #A6192E;
    color: white;
    text-align: center;
    padding: 20px;
}

/* BOTÓN REGRESO */
.back-button {
    position: fixed;
    top: 20px;
    left: 20px;
    background: #A6192E;
    color: white;
    padding: 10px 15px;
    border-radius: 30px;
    text-decoration: none;
}

/* TITULO */
.title {
    text-align: center;
    font-size: 50px;
    color: #A6192E;
    margin: 20px;
}

/* GRID GALERIA */
.gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 40px;
}

/* CUADROS MEDIANOS */
.item {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    transition: 0.3s;
    cursor: pointer;
}

.item:hover {
    transform: scale(1.05);
}

.item img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

.caption {
    padding: 10px;
    text-align: center;
}

/* ===== LIGHTBOX ===== */
.lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

.lightbox img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
}

.lightbox .controls {
    margin-top: 15px;
}

.lightbox button {
    background: #A6192E;
    color: white;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    border-radius: 5px;
}

</style>
</head>

<body>

<a href="index.html" class="back-button">⬅ Regresar</a>

<div class="header">
    <h1>GALERÍA ESCOLAR</h1>
</div>

<h2 class="title">Momentos</h2>

<div class="gallery-grid">

    <div class="item" onclick="openGallery(0)">
        <img src="interprepas.jpg">
        <div class="caption">Interprepas</div>
    </div>

    <div class="item" onclick="openGallery(1)">
        <img src="diabandera.jpg">
        <div class="caption">Demostración de Escoltas</div>
    </div>

    <div class="item" onclick="openGallery(2)">
        <img src="saludmental.png">
        <div class="caption">Día de la Salud Mental</div>
    </div>

    <div class="item" onclick="openGallery(3)">
        <img src="thanksgiving.jpg">
        <div class="caption">Thanksgiving Dinner</div>
    </div>
    <div class="item" onclick="openGallery(4)">
        <img src="copacajeme.jpg">
        <div class="caption">Copa Cajeme</div>
    </div>

    <div class="item" onclick="openGallery(5)">
        <img src="verde.png">
        <div class="caption">Visita de Verde Valley School</div>
    </div>

    <div class="item" onclick="openGallery(6)">
        <img src="muertos.jpg">
        <div class="caption">Día de Muertos</div>
    </div>
    <div class="item" onclick="openGallery(7)">
        <img src="reconocimientos.webp">
        <div class="caption">Entrega de Reconocimientos</div>
    </div>
     <div class="item" onclick="openGallery(8)">
        <img src="viaje.avif">
        <div class="caption">Viaje Universitario</div>
    </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <img id="lightbox-img">
    <div class="controls">
        <button onclick="prevImage()">⬅</button>
        <button onclick="nextImage()">➡</button>
        <button onclick="closeLightbox()">Cerrar</button>
    </div>
</div>

<script>

// 🔥 GALERÍAS (pon aquí tus fotos reales)
const galleries = [
    ["basquetbol1.jpg","basquetbol2.jpg","basquetbol3.jpg","ajedrez1.jpg","ajedrez2.jpg","ajedrez3.jpg"], 
    ["bandera1.jpg","bandera2.jpg","bandera3.jpg","bandera4.jpg"],         
    ["salud1.jpg","salud2.jpg","salud3.jpg","salud4.jpg"], 
    ["tg1.jpg","tg2.jpg","tg3.jpg","tg4.jpg","tg5.jpg","tg6.jpg"],
    ["cajeme1.jpg","cajeme2.jpg","cajeme3.jpg","cajeme4.jpg"],
    ["verde1.jpg","verde2.jpg","verde3.jpg","verde4.jpg","verde5.jpg"],
    ["muertos1.jpg","muertos2.jpg","muertos3.jpg","muertos4.jpg","muertos5.jpg","muertos6.jpg","muertos7.jpg","muertos8.jpg","muertos9.jpg","muertos10.jpg","muertos11.jpg"],
    ["r1.jpg","r2.jpg","r3.jpg","r4.jpg","r5.jpg","r6.jpg","r7.jpg","r8.jpg","r9.jpg","r10.jpg","r11.jpg","r12.jpg","r13.jpg","r14.jpg","r15.jpg","r16.jpg","r17.jpg","r18.jpg","r19.jpg","r20.jpg","r21.jpg","r22.jpg","r23.jpg","r24.jpg"],
    ["uvm.jpg","uvm2.jpg","tec.jpg","tec1.jpg","tec2.jpg","tec3.jpg","uds.jpg","uds2.jpg","uds3.jpg","unison.jpg","unison2.jpg","vizcaya.jpg","vizcaya2.jpg","vizcaya3.jpg","museo.jpg","museo2.jpg","mirador.jpg","ues.jpg","ues2.jpg","ues3.jpg","ues4.jpg"]    
];

let currentGallery = [];
let currentIndex = 0;

function openGallery(index){
    currentGallery = galleries[index];
    currentIndex = 0;
    document.getElementById("lightbox").style.display = "flex";
    showImage();
}

function showImage(){
    document.getElementById("lightbox-img").src = currentGallery[currentIndex];
}

function nextImage(){
    currentIndex = (currentIndex + 1) % currentGallery.length;
    showImage();
}

function prevImage(){
    currentIndex = (currentIndex - 1 + currentGallery.length) % currentGallery.length;
    showImage();
}

function closeLightbox(){
    document.getElementById("lightbox").style.display = "none";
}

</script>

</body>
</html>
